
<style>
#erd svg { max-width: 100%; height: auto; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const diagram = `erDiagram
  COUNTRY {
    int id PK
    string name
    string code
    string flag_url
    string continent
  }
  CONFEDERATION {
    int id PK
    string name
    string code
    int country_id FK
  }
  COMPETITION {
    int id PK
    string name
    string slug
    string type
    int country_id FK
    int confederation_id FK
    int tier
    int max_teams
    bool is_international
    bool is_cup
  }
  SEASON {
    int id PK
    int competition_id FK
    string name
    date start_date
    date end_date
    bool is_active
  }
  TEAM {
    int id PK
    string name
    string short_name
    string tm_href
    int country_id FK
    int stadium_id FK
    int founded_year
    string primary_color
    decimal reputation
    decimal market_value
  }
  STADIUM {
    int id PK
    string name
    int city_id FK
    int capacity
    string surface
  }
  CITY {
    int id PK
    string name
    int country_id FK
    decimal latitude
    decimal longitude
  }
  SEASON_TEAM {
    int id PK
    int season_id FK
    int team_id FK
    string group_name
    int position
    int points
    int played
    int won
    int drawn
    int lost
    int goals_for
    int goals_against
  }
  MATCH {
    int id PK
    int season_id FK "nullable"
    int home_team_id FK
    int away_team_id FK
    int stadium_id FK
    datetime scheduled_at
    string status
    string match_type
    int home_score
    int away_score
    int round
    string phase
  }
  PERSON {
    int id PK
    string first_name
    string last_name
    string tm_href
    date birth_date
    int nationality_id FK
    int second_nationality_id FK "nullable"
    string position_code
    string position_group
    int jersey_number
    decimal market_value
    decimal overall_rating
    decimal potential_rating
    string role
    bool is_captain
  }
  CONTRACT {
    int id PK
    int person_id FK
    int team_id FK
    string contract_type
    date start_date
    date end_date
    decimal salary
    decimal release_clause
    string status
  }
  PLAYER_STATS {
    int id PK
    int person_id FK
    int season_id FK
    int team_id FK
    int appearances
    int goals
    int assists
    int yellow_cards
    int red_cards
    int minutes_played
    int clean_sheets
  }
  TRANSFER {
    int id PK
    int person_id FK
    int from_team_id FK
    int to_team_id FK
    int agent_id FK "nullable"
    date transfer_date
    decimal fee
    string type
  }
  MATCH_EVENT {
    int id PK
    int match_id FK
    int person_id FK
    int team_id FK
    string event_type
    int minute
    int extra_minute
    int related_person_id FK "nullable"
  }
  INJURY {
    int id PK
    int person_id FK
    int team_id FK
    string injury_type
    date start_date
    date expected_return
    date actual_return
    string severity
  }
  PLAYER_ATTRIBUTE {
    int id PK
    int person_id FK
    int season_id FK
    string attribute_group
    string attribute_name
    int value
  }

  COUNTRY ||--o{ CONFEDERATION : "hosts"
  COUNTRY ||--o{ COMPETITION : "organizes"
  COUNTRY ||--o{ TEAM : "based in"
  COUNTRY ||--o{ CITY : "contains"
  COUNTRY ||--o{ PERSON : "nationality"
  CONFEDERATION ||--o{ COMPETITION : "runs"
  COMPETITION ||--o{ SEASON : "has"
  SEASON ||--o{ SEASON_TEAM : "includes"
  SEASON ||--o{ MATCH : "schedules"
  SEASON ||--o{ PLAYER_STATS : "records"
  TEAM ||--o{ SEASON_TEAM : "participates"
  TEAM ||--o{ CONTRACT : "employs"
  TEAM ||--o{ PLAYER_STATS : "tracks"
  TEAM ||--o{ TRANSFER : "sells from"
  TEAM ||--o{ TRANSFER : "buys to"
  TEAM }o--|| STADIUM : "home ground"
  STADIUM }o--|| CITY : "located in"
  MATCH }o--|| STADIUM : "held at"
  MATCH }o--|| TEAM : "home"
  MATCH }o--|| TEAM : "away"
  MATCH ||--o{ MATCH_EVENT : "contains"
  PERSON ||--o{ CONTRACT : "has"
  PERSON ||--o{ PLAYER_STATS : "recorded"
  PERSON ||--o{ TRANSFER : "involved in"
  PERSON ||--o{ MATCH_EVENT : "performs"
  PERSON ||--o{ INJURY : "suffers"
  PERSON ||--o{ PLAYER_ATTRIBUTE : "has"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill','stroke','stroke-width','class','style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
